<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Silly Wizards Guild</title>
<meta name="description" content="A curious collective blending design, storytelling and technology.">
<meta property="og:title" content="Silly Wizards Guild">
<meta property="og:description" content="A curious collective blending design, storytelling and technology.">
<meta property="og:image" content="https://www.sillywizardsguild.com/SillyBlackLogoLine.png">
<meta property="og:url" content="https://www.sillywizardsguild.com">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://www.sillywizardsguild.com/SillyBlackLogoLine.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jacquard+12&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
:root{
--paper:#E9E8E5;
--ink:#111111;
--muted:rgba(17,17,17,.68);
--faint:rgba(17,17,17,.22);
--pad:28px;
--max:820px;
--border:2px;
}

*{box-sizing:border-box}
html,body{height:100%}

/* Fixed keyline frame (never breaks; doesn't affect layout) */

body{
margin:0;
background:var(--paper);
color:var(--ink);
font-family:"Spectral", serif;
-webkit-font-smoothing:antialiased;
text-rendering:geometricPrecision;
overflow-x:hidden;
}

.wrap{
max-width:var(--max);
margin:0 auto;
padding:var(--pad);
position:relative;
}

/* Logo */
header{
text-align:center;
margin-top: 4px;
margin-bottom: 14px;
}
.logo-img{
width: 320px;
max-width: 86%;
height:auto;
display:block;
margin: 0 auto 10px auto;
image-rendering: pixelated;
}

/* Wizard pinned top-right */
.wizard-pin{
position:absolute;
top: var(--pad);
right: var(--pad);
width: 76px;
height: 76px;
border:none;
background:transparent;
padding:0;
cursor:pointer;
-webkit-tap-highlight-color: transparent;
}
.wizard-pin img{
width: 76px;
height: 76px;
display:block;
image-rendering: pixelated;
}

/* Incantation */
.incantation{
text-align:center;
margin: 26px 0 18px;
}
.spell{
margin:0;
font-size: clamp(30px, 4.2vw, 54px);
line-height:1.12;
letter-spacing:.01em;
font-weight:400;
}
.spell-controls{
  margin-top: 12px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:25px;
  align-items:center;
}
.btn{
  border:none;
  background:transparent;
  padding:4px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  width: 80px;
  height: 80px;
}

@keyframes wandFloat{
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

#shuffleSpell{
  animation: wandFloat 2.8s ease-in-out infinite;
  transition: transform 160ms ease;
} 
@media (hover: hover) and (pointer: fine){
  #shuffleSpell:hover{
    animation: none;
    transform: translateY(-8px) rotate(-11deg) scale(1.10);
  }
}
.btn img{
  width: 100%;
  height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
  display:block;
}
/* Field */
.field{
position:relative;
height: 860px; /* more space so large icons never collide */
margin-top: 16px;
border-bottom: 1px solid var(--faint);
}

.artefact{
position:absolute;
border:none;
background:transparent;
padding:0;
cursor:pointer;
-webkit-tap-highlight-color: transparent;
transform-origin:center;
opacity:1;
}
.artefact img{
width:100%;
height:100%;
display:block;
image-rendering: pixelated;
}
@keyframes wobble {
  0%{ transform:scale(1) rotate(0deg); opacity:1; }
  15%{ transform:scale(1.18) rotate(-18deg); opacity:1; }
  35%{ transform:scale(1.14) rotate(14deg); opacity:1; }
  55%{ transform:scale(1.10) rotate(-10deg); opacity:1; }
  72%{ transform:scale(1.06) rotate(6deg); opacity:1; }
  88%{ transform:scale(1.03) rotate(-2deg); opacity:1; }
  100%{ transform:scale(1) rotate(0deg); opacity:1; }
}
@keyframes iconPop {
  0%{ transform:scale(1) rotate(0deg); }
  30%{ transform:scale(1.22) rotate(-6deg); }
  62%{ transform:scale(0.92) rotate(3deg); }
  100%{ transform:scale(1) rotate(0deg); }
}
.artefact:hover{ animation:wobble 0.6s ease forwards !important; }
.wizard-pin:hover,#cameraPin:hover{ animation:wobble 0.6s ease forwards; }
#shuffleSpell:hover{ animation:wobble 0.6s ease forwards !important; }
.wizard-pin.popping,#cameraPin.popping{ animation:iconPop 0.32s ease !important; }
.artefact.popping{ animation:iconPop 0.32s ease !important; }

/* RPG dialog box (larger, monochrome, square, no shadows) */
.dialog{
position:fixed;
left: 24px;
top: 24px;
width: min(520px, calc(100vw - 48px));
background: 
  linear-gradient(
    135deg,
    rgba(255, 110, 199, 0.18),
    rgba(90, 200, 250, 0.16),
    rgba(255, 214, 10, 0.14)
  ),
  var(--paper);
border: var(--border) solid var(--ink);
padding: 18px 18px 16px;
display:none;
z-index: 999;
}
.dialog::before{
content:"";
position:absolute;
inset:-6px;
border: var(--border) solid var(--ink);
pointer-events:none;
}

/* Dialog title is Spectral now */
.d-title{
margin:0 0 10px 0;
font-family:"Spectral", serif;
font-size: 20px;
font-weight: 600;
letter-spacing: .01em;
}
.d-text{
margin:0;
font-size: 15px;
line-height: 1.5;
color: rgba(17,17,17,.92);
white-space: pre-line;
}
.d-img{
display:none;
width:100%;
margin-top: 12px;
border: var(--border) solid var(--ink);
image-rendering: pixelated;
}
.d-actions{
margin-top: 12px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}
.d-link{
text-decoration:none;
color:var(--ink);
border-bottom:1px solid var(--ink);
font-weight:600;
font-size: 13px;
display:inline-block;
padding-bottom:2px;
}
.d-link[aria-disabled="true"]{
opacity:.5;
border-bottom-color: transparent;
cursor: default;
pointer-events:none;
}
.d-close{
border:1px solid var(--faint);
background:transparent;
color:var(--ink);
padding:6px 10px;
font-family:"Spectral", serif;
font-size:13px;
cursor:pointer;
}

footer{
margin-top: 18px;
text-align:center;
color: var(--muted);
font-size: 12px;
font-style: italic;
}

.wand-note{
  margin: 0;
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  font-style: italic;
}

@media (max-width: 520px){
:root{ --pad:18px; .field{ height: 820px; }
.wizard-pin{ width:70px; height:70px; }
.wizard-pin img{ width:70px; height:70px; }
.dialog{ left: 14px; top: 14px; width: min(520px, calc(100vw - 28px)); }
}
@keyframes artefactIn { from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
@keyframes slideUp { from{ transform:translateY(20px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
@media(prefers-reduced-motion:reduce){ .artefact,.artefact:hover,.artefact.popping,#shuffleSpell{ animation:none !important; } }
</style>
</head>

<body>
<div class="wrap">

<!-- Wizard (pinned) -->
<button class="wizard-pin" id="wizardPin" aria-label="Wizard portal (contact)">
<img src="icons/WIZARD.png" alt="">
</button>

<header>
<img class="logo-img" src="SillyBlackLogoLine.png" alt="Silly Wizards">

</header>

<section class="incantation">
<p class="spell" id="spellLine">Thread the signal through the sleeping wire.</p>
<div class="spell-controls">
<!-- Refresh icon only -->
<button class="btn" id="shuffleSpell" type="button" aria-label="New spell">
  <img src="icons/WAND.png" alt="" class="btn-icon">
</button>
  
  <p class="wand-note">'i didn't realise you could tap on the icons' — J.Strang</p>

</section>

<!-- RPG Dialog -->

</div>

<footer>
Pixel artefacts courtesy of DJ Kirie / NHA / Rizkey / Robin Lopez / Widphic @nounproject.

/**********************
* Constellation hover + no-overlap placement
**********************/
const ICON_BASE = 90; // icon size
const DRIFT_X = 3; // micro hover
const DRIFT_Y = 4;
const GAP = 40; // extra breathing room between icons (edge-to-edge)
const MOBILE_SCALE = 0.82; // shrink icons on small screens only


/**********************
* DOM
**********************/
const field = document.getElementById("field");
const dialog = document.getElementById("dialog");
const dTitle = document.getElementById("dTitle");
const dText = document.getElementById("dText");
const dImg = document.getElementById("dImg");
const dLink = document.getElementById("dLink");

function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function rand(min,max){ return Math.random()*(max-min)+min; }
function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

/**********************
* Incantation
**********************/
function setSpell(){
document.getElementById("spellLine").textContent = choice(INCANTATIONS);
}

/**********************
* Dialog
**********************/
function hideDialog(){
dialog.style.display = "none";
}

function openDialogFor(art, anchorRect){
dTitle.textContent = art.title || "";
dText.textContent = art.text || "";

if (art.image){
dImg.src = art.image;
dImg.style.display = "block";
} else {
dImg.style.display = "none";
}

if (art.comingSoon){
dLink.textContent = "Soon →";
dLink.href = "#";
dLink.setAttribute("aria-disabled","true");
dLink.style.display = "inline-block";
} else if (art.link){
dLink.textContent = "Enter →";
dLink.href = art.link;
dLink.setAttribute("aria-disabled","false");
dLink.style.display = "inline-block";
} else {
dLink.style.display = "none";
}

dialog.style.display = "block";
if (window.innerWidth <= 520) { return; }
const margin = 12;
const dw = dialog.offsetWidth;
const dh = dialog.offsetHeight;

let left = anchorRect.left + anchorRect.width + 12;
let top = anchorRect.top - 8;

left = clamp(left, margin, window.innerWidth - dw - margin);
top = clamp(top, margin, window.innerHeight - dh - margin);

dialog.style.left = left + "px";
dialog.style.top = top + "px";
}

/**********************
* Field / Artefacts
**********************/
let nodes = [];
let fieldW = 0;
let fieldH = 0;

function measureField(){
const r = field.getBoundingClientRect();
fieldW = r.width;
fieldH = r.height;
}

// Size-aware + drift-aware placement to avoid overlap
function findSpot(size){
const pad = 28;
const tries = 4000;

for(let t=0; t<tries; t++){
const x = rand(pad, fieldW - size - pad);
const y = rand(pad, fieldH - size - pad);

const ok = nodes.every(n => {
const required =
(size/2) + (n.size/2) + GAP + (Math.max(DRIFT_X, DRIFT_Y) * 2);

const dx = (n.ax - x);
const dy = (n.ay - y);
return (dx*dx + dy*dy) > (required * required);
});

if(ok) return {x,y};
}

return { x: rand(pad, fieldW - size - pad), y: rand(pad, fieldH - size - pad) };
}

function spawnArtefacts(){
field.innerHTML = "";
nodes = [];
measureField();

const floaters = ARTEFACTS.filter(a => !a.pinned && a.id !== "CAMERA");

floaters.forEach((art) => {
const el = document.createElement("button");
el.type = "button";
el.className = "artefact";
el.setAttribute("aria-label", art.title || art.id);

const scale = rand(0.90, 1.08);
const isMobile = window.matchMedia("(max-width: 520px)").matches;
const base = isMobile ? ICON_BASE * 0.82 : ICON_BASE;
const size = Math.round(base * scale);
el.style.width = size + "px";
el.style.height = size + "px";

const img = document.createElement("img");
img.src = "icons/" + art.file;
img.alt = "";
el.appendChild(img);

const spot = findSpot(size);
const ax = spot.x;
const ay = spot.y;

const phase = rand(0, Math.PI*2);
const phase2 = rand(0, Math.PI*2);

el.style.left = ax + "px";
el.style.top = ay + "px";
const noMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

el.addEventListener("click", (e) => {
e.stopPropagation();
const rect = el.getBoundingClientRect();
spawnSparkle(rect.left + rect.width/2, rect.top + rect.height/2);
el.classList.add("popping");
el.addEventListener("animationend", () => el.classList.remove("popping"), {once:true});
openDialogFor(art, rect);
});

field.appendChild(el);
nodes.push({ art, el, ax, ay, phase, phase2, size });
});
}

function animate(){
if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) { requestAnimationFrame(animate); return; }
const t = Date.now() * 0.001;

for(const n of nodes){
const x = n.ax + Math.sin(t * 0.7 + n.phase) * DRIFT_X;
const y = n.ay + Math.cos(t * 0.6 + n.phase2) * DRIFT_Y;

const cx = clamp(x, 6, fieldW - n.size - 6);
const cy = clamp(y, 6, fieldH - n.size - 6);

n.el.style.left = cx + "px";
n.el.style.top = cy + "px";
}

requestAnimationFrame(animate);
}

/**********************
* Wizard pin
**********************/
function setupWizard(){
const wizData = ARTEFACTS.find(a => a.id === "WIZARD");
const wizBtn = document.getElementById("wizardPin");

wizBtn.addEventListener("click", (e) => {

const wr = wizBtn.getBoundingClientRect();
spawnSparkle(wr.left + wr.width/2, wr.top + wr.height/2);
wizBtn.classList.add("popping");
wizBtn.addEventListener("animationend", () => wizBtn.classList.remove("popping"), {once:true});
openDialogFor(wizData, wr);
});
}
  function setupCamera() {
  const camData = ARTEFACTS.find(a => a.id === "CAMERA");

  const cam = document.createElement("img");
  cam.src = camData.src;
  cam.id = "cameraPin";

cam.style.position = "absolute";
cam.style.top = "var(--pad)";
cam.style.left = "var(--pad)";
cam.style.width = "52px";
cam.style.height = "52px";
cam.style.cursor = "pointer";
cam.style.zIndex = "10";
cam.style.imageRendering = "pixelated";

  cam.addEventListener("click", (e) => {
e.stopPropagation();
const cr = cam.getBoundingClientRect();
spawnSparkle(cr.left + cr.width/2, cr.top + cr.height/2);
cam.classList.add("popping");
cam.addEventListener("animationend", () => cam.classList.remove("popping"), {once:true});
openDialogFor(camData, cr);
});

  document.querySelector(".wrap").appendChild(cam);
}

/**********************
* Sparkle burst
**********************/
function spawnSparkle(cx, cy){
  if(window.matchMedia("(prefers-reduced-motion:reduce)").matches) return;
  const palette=["#ff6ec7","#ffd700","#7edcff","#E9E8E5","#111111","#c084fc"];
  const count=8;
  for(let i=0;i<count;i++){
    const p=document.createElement("div");
    const size=4+Math.round(Math.random()*4);
    p.style.cssText="position:fixed;width:"+size+"px;height:"+size+"px;background:"+palette[i%palette.length]+";pointer-events:none;z-index:9998;left:"+(cx-size/2)+"px;top:"+(cy-size/2)+"px;image-rendering:pixelated;";
    document.body.appendChild(p);
    const angle=(i/count)*Math.PI*2+Math.random()*0.4;
    const dist=35+Math.random()*40;
    const dx=Math.cos(angle)*dist;
    const dy=Math.sin(angle)*dist;
    p.animate(
      [{transform:"translate(0,0) scale(1)",opacity:1},{transform:"translate("+dx+"px,"+dy+"px) scale(0)",opacity:0}],
      {duration:420+Math.random()*180,easing:"cubic-bezier(0.2,0.8,0.4,1)",fill:"forwards"}
    ).onfinish=()=>p.remove();
  }
}

/**********************
* Init
**********************/
function init(){
setSpell();
document.getElementById("shuffleSpell").addEventListener("click", () => {
setSpell();
const wnd = document.getElementById("shuffleSpell");
const wr2 = wnd.getBoundingClientRect();
spawnSparkle(wr2.left + wr2.width/2, wr2.top + wr2.height/2);
wnd.classList.add("popping");
wnd.addEventListener("animationend", () => wnd.classList.remove("popping"), {once:true});
});

document.getElementById("dClose").addEventListener("click", hideDialog);
dialog.addEventListener("click", (e) => e.stopPropagation());
document.addEventListener("click", () => hideDialog());

spawnArtefacts();
setupWizard();
setupCamera();
requestAnimationFrame(animate);

window.addEventListener("resize", () => {
hideDialog();
spawnArtefacts();
});
}

init();
</script>
